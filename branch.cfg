cfgs:
  default:
    branches: ['main']
    inherit:
      ocm-gear:
        jobs:
          update-dependencies:
            traits:
              update_component_deps:
                merge_policies:
                  - merge_mode: auto_merge
                    merge_method: rebase
              cronjob:
                interval: 5m
              component_descriptor:
                ocm_repository: europe-docker.pkg.dev/gardener-project/snapshots
          head-update:
            steps:
              lint:
                execute: lint
            traits:
              component_descriptor:
                ocm_repository: europe-docker.pkg.dev/gardener-project/snapshots
          automatic-release:
            steps:
              trigger-release:
                execute: trigger_release.py
                inputs:
                  component_descriptor_dir: component_descriptor_dir
                vars:
                  RELEASE_JOB_NAME: pipeline.variant("manual-release").job_name()
                  PIPELINE_NAME: pipeline_descriptor.get("name")
                depends:
                  - component_descriptor
            traits:
              component_descriptor:
                ocm_repository: europe-docker.pkg.dev/gardener-project/snapshots

  hotfix-branches:
    branches: ['hotfix-.*']
    inherit:
      ocm-gear:
        jobs:
          manual-release:
            traits:
              version:
                preprocess: finalise-skip-patchlevel-zero
              release:
                nextversion: bump_patch
